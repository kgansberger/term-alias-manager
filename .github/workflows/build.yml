name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS .app ─────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: cd "$GITHUB_WORKSPACE/TermLink" && pip install PyQt6 py2app

      - name: Build .app
        run: cd "$GITHUB_WORKSPACE/TermLink" && python setup.py py2app

      - name: Fix libffi
        run: |
          FRAMEWORKS="$GITHUB_WORKSPACE/TermLink/dist/TermLink.app/Contents/Frameworks"
          LIBFFI=$(find /usr/local /opt/homebrew -name "libffi.8.dylib" 2>/dev/null | head -1)
          [ -n "$LIBFFI" ] && cp "$LIBFFI" "$FRAMEWORKS/" && echo "Copied $LIBFFI" || echo "libffi not found, skipping"

      - name: Package .app
        run: |
          cd "$GITHUB_WORKSPACE/TermLink/dist"
          ditto -c -k --sequesterRsrc --keepParent TermLink.app "TermLink-${GITHUB_REF_NAME}-macOS.zip"
          ls -lh "TermLink-${GITHUB_REF_NAME}-macOS.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: TermLink/dist/TermLink-*-macOS.zip

  # ── Windows .exe ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller
        shell: pwsh

      - name: Write version.py
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          Set-Content -Path "$env:GITHUB_WORKSPACE\TermLink\src\version.py" -Value "__version__ = `"$tag`""
          Write-Host "Version: $tag"

      - name: Build .exe
        shell: pwsh
        run: |
          Set-Location "$env:GITHUB_WORKSPACE\TermLink"
          pyinstaller --noconfirm --onefile --windowed `
            --name TermLink `
            --add-data "src;src" `
            --hidden-import zshrc_parser `
            --hidden-import version `
            main.py

      - name: Package .exe
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}"
          $dist = "$env:GITHUB_WORKSPACE\TermLink\dist"
          Compress-Archive -Path "$dist\TermLink.exe" -DestinationPath "$dist\TermLink-${v}-Windows.zip"
          Get-Item "$dist\TermLink-${v}-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: TermLink/dist/TermLink-*-Windows.zip

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-build/*.zip
            artifacts/windows-build/*.zip
          generate_release_notes: true
          body: |
            ## TermLink ${{ github.ref_name }}

            | Platform | Download |
            |----------|----------|
            | **macOS** | `TermLink-${{ github.ref_name }}-macOS.zip` → unzip, drag to /Applications |
            | **Windows** | `TermLink-${{ github.ref_name }}-Windows.zip` → unzip, run TermLink.exe |

            > **macOS:** right-click → Open on first launch if Gatekeeper blocks the app.
            > **Windows:** requires Git Bash or WSL for shell alias functionality.
